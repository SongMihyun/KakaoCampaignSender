name: Auto Fill PR Body with Commits

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  update-pr-body:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate commit list
        id: commits
        run: |
          echo "## 📦 이번 PR에 포함된 커밋" > commits.txt
          echo "" >> commits.txt

          git fetch origin ${{ github.event.pull_request.base.ref }}

          git log origin/${{ github.event.pull_request.base.ref }}..HEAD \
            --pretty=format:"- %s" >> commits.txt

          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          cat commits.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update PR Body
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.commits.outputs.BODY }}`;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: body
            });