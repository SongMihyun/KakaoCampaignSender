# FILE: .github/workflows/build-check.yml
name: Windows Build Check

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
    paths-ignore:
      - ".github/release.yml"
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipx
          pipx install poetry
          poetry --version

      - name: Validate poetry project
        run: |
          poetry check
          poetry check --lock

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      - name: Compile all Python files
        run: |
          python -m compileall src

      - name: Verify critical files
        run: |
          $required = @(
            "src/app/main.py",
            "src/app/version.py"
          )

          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required file not found: $path"
            }
          }

      - name: Verify PyInstaller spec exists
        run: |
          if (-not (Test-Path "KakaoSender.spec")) {
            throw "KakaoSender.spec not found at repo root."
          }

      - name: Build smoke check
        run: |
          if (Test-Path "build") { Remove-Item "build" -Recurse -Force }
          if (Test-Path "dist") { Remove-Item "dist" -Recurse -Force }

          poetry run pyinstaller -y --clean `
            --distpath dist/app `
            --workpath build/pyinstaller `
            KakaoSender.spec

      - name: Verify build output
        run: |
          $exePath = "dist/app/KakaoCampaignSender/KakaoCampaignSender.exe"
          if (-not (Test-Path $exePath)) {
            Write-Host "----- dist/app tree -----"
            if (Test-Path "dist/app") {
              Get-ChildItem -Recurse "dist/app" | Select-Object FullName
            }
            throw "Expected EXE not found: $exePath"
          }
          Write-Host "OK: $exePath"